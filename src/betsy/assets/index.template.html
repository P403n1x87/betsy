<!DOCTYPE html>
<meta charset="utf-8">
<style>
    body {
        background-color: darkslategray;
        padding-top: 48px;
    }

    .node {
        font: 300 13px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
        fill: #bbb;
    }

    #tooltip {
        color: #bbb;
        font: 300 16px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .node:hover {
        fill: rgb(212, 80, 224);
    }

    .link {
        stroke: gray;
        stroke-opacity: 0.4;
        fill: none;
        pointer-events: none;
    }

    .node:hover,
    .node--source,
    .node--target {
        font-weight: 700;
        font-size: 16px;
    }

    .node--source {
        fill: #5890e2;
    }

    .node--target {
        fill: #d6bc27;
    }

    .link--source,
    .link--target {
        stroke-opacity: 1;
        stroke-width: 2px;
    }

    .link--source {
        stroke: #d6bc27;
    }

    .link--target {
        stroke: #5890e2;
    }

    .link--cycle {
        stroke: #e23d3d;
        stroke-opacity: 0.9;
        stroke-width: 2px;
        stroke-dasharray: 5, 3;
    }

    .topo-link {
        stroke: #8899a0;
        stroke-opacity: 0.55;
        fill: none;
    }

    .topo-link--source {
        stroke: #d6bc27;
        stroke-opacity: 1;
        stroke-width: 2px;
    }

    .topo-link--target {
        stroke: #5890e2;
        stroke-opacity: 1;
        stroke-width: 2px;
    }

    .topo-link--cycle {
        stroke: #e23d3d;
        stroke-opacity: 0.85;
        stroke-width: 2px;
        stroke-dasharray: 5, 3;
    }

    .topo-node rect {
        fill: #24393a;
        stroke: #6d8f90;
        stroke-width: 1px;
    }

    .topo-node text {
        fill: #bbb;
        font: 300 16px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
    }

    .topo-node .topo-node-title {
        font-weight: 700;
    }

    .topo-node .topo-node-subtitle {
        font-size: 13px;
        fill-opacity: 0.65;
    }

    .topo-node:hover rect {
        stroke: rgb(212, 80, 224);
        stroke-width: 2px;
    }

    .topo-node:hover text {
        fill: rgb(212, 80, 224);
    }

    .topo-node--source rect {
        stroke: #d6bc27;
        stroke-width: 2px;
    }

    .topo-node--source text {
        fill: #d6bc27;
        font-weight: 700;
    }

    .topo-node--target rect {
        stroke: #5890e2;
        stroke-width: 2px;
    }

    .topo-node--target text {
        fill: #5890e2;
        font-weight: 700;
    }

    .topo-node--leaf rect {
        fill: #1f3a24;
        stroke: #6fbf73;
    }

    .topo-node--leaf text {
        fill: #a3d9a5;
    }

    .topo-node--cycle rect {
        fill: #3a1f1f;
        stroke: #e23d3d;
        stroke-width: 2px;
    }

    .topo-node--cycle text {
        fill: #f2a3a3;
        font-weight: 700;
    }

    .topo-node--group rect {
        stroke-dasharray: 4, 3;
    }

    .topo-node--expandable {
        cursor: pointer;
    }

    #bundle,
    #topo {
        margin-left: auto;
        margin-right: auto;
        display: block;
    }

    #legend {
        position: fixed;
        right: 0px;
        top: 0px;
    }

    #tabs {
        position: fixed;
        left: 0px;
        top: 0px;
        z-index: 20;
        padding: 8px;
    }

    #tabs button {
        background: #2f4f4f;
        color: #ddd;
        border: 1px solid #567;
        border-radius: 3px;
        padding: 6px 12px;
        margin-right: 4px;
        font: 300 13px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: pointer;
    }

    #tabs button.active {
        background: #5890e2;
        color: #111;
        font-weight: 700;
    }

    #topo-controls {
        display: none;
        margin-left: 12px;
        padding-left: 12px;
        border-left: 1px solid #567;
    }

    #topo-controls.active {
        display: inline;
    }

    #topo-controls button {
        background: #2f4f4f;
        color: #ddd;
        border: 1px solid #567;
        border-radius: 3px;
        padding: 6px 12px;
        margin-right: 4px;
        font: 300 13px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: pointer;
    }
</style>

<body>
    <div id="tabs">
        <button id="tab-bundle" class="active">Hierarchical Bundle</button>
        <button id="tab-topo">Topological Sort</button>
        <span id="topo-controls">
            <button id="topo-expand-all">Expand all</button>
            <button id="topo-collapse-all">Collapse all</button>
        </span>
    </div>

    <div id="view-bundle"></div>
    <div id="view-topo" style="display: none;"></div>

    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script>

        var classes = []

        var tooltip = d3.select("body")
            .append("div")
            .attr("id", "tooltip")
            .style("position", "fixed")
            .style("z-index", "10")
            .style("visibility", "hidden")
            .text("a simple tooltip");

        var legend = d3.select("body").append("svg")
            .attr("id", "legend")
            .attr("width", 128)
            .attr("height", 48);

        legend.append("circle")
            .attr("cx", 10).attr("cy", 12).attr("r", 6)
            .style("fill", "#d6bc27")
        legend.append("text")
            .attr("x", 30).attr("y", 12)
            .attr("alignment-baseline", "middle").attr("fill", "#bbb")
            .text("imports").style("font-size", "11px")

        legend.append("circle")
            .attr("cx", 10).attr("cy", 32).attr("r", 6)
            .style("fill", "#5890e2")
        legend.append("text")
            .attr("x", 30).attr("y", 32)
            .attr("alignment-baseline", "middle").attr("fill", "#bbb")
            .text("imported by").style("font-size", "11px")

        // -- Tabs --------------------------------------------------------------

        d3.select("#tab-bundle").on("click", function () { showView("bundle"); });
        d3.select("#tab-topo").on("click", function () { showView("topo"); });

        function showView(view) {
            d3.select("#view-bundle").style("display", view === "bundle" ? "block" : "none");
            d3.select("#view-topo").style("display", view === "topo" ? "block" : "none");
            d3.select("#tab-bundle").classed("active", view === "bundle");
            d3.select("#tab-topo").classed("active", view === "topo");
            d3.select("#topo-controls").classed("active", view === "topo");
        }

        // -- Hierarchical edge bundling -----------------------------------------

        var diameter = 800,
            radius = diameter / 3,
            innerRadius = radius - 120;

        var cluster = d3.cluster()
            .size([360, innerRadius]);

        var line = d3.radialLine()
            .curve(d3.curveBundle.beta(0.85))
            .radius(function (d) { return d.y; })
            .angle(function (d) { return d.x / 180 * Math.PI; });

        var svg = d3.select("#view-bundle").append("svg")
            .attr("id", "bundle")
            .attr("width", diameter)
            .attr("height", diameter)
            .append("g")
            .attr("transform", "translate(" + diameter / 2 + "," + diameter / 2 + ")");

        var link = svg.append("g").selectAll(".link"),
            node = svg.append("g").selectAll(".node");

        var root = packageHierarchy(classes)
            .sum(function (d) { return 1; });


        var nodes = []
        root.each(d => nodes.push(d));

        cluster(root);

        link = link
            .data(packageImports(root))
            .enter().append("path")
            .each(function (d) { d.source = d[0], d.target = d[d.length - 1]; })
            .attr("class", "link")
            .attr("d", line);

        node = node
            .data(nodes)
            .enter().append("text")
            .attr("class", "node")
            .attr("dy", "0.31em")
            .attr("transform", function (d) { return "rotate(" + (d.x - 90) + ")translate(" + (d.y + 8) + ",0)" + (d.x < 180 ? "" : "rotate(180)"); })
            .attr("text-anchor", function (d) { return d.x < 180 ? "start" : "end"; })
            .text(function (d) { return d.data.key; })
            .on("mouseover", mouseovered)
            .on("mouseout", mouseouted);

        function mouseovered(d) {
            node
                .each(function (n) { n.target = n.source = false; });

            link
                .classed("link--target", function (l) { if (l.target === d) return l.source.source = true; })
                .classed("link--source", function (l) { if (l.source === d) return l.target.target = true; })
                .filter(function (l) { return l.target === d || l.source === d; })
                .raise();

            node
                .classed("node--target", function (n) { return n.target; })
                .classed("node--source", function (n) { return n.source; });

            tooltip
                .text(d.data.name)
                .style("visibility", "visible");
        }

        function mouseouted(d) {
            link
                .classed("link--target", false)
                .classed("link--source", false);

            node
                .classed("node--target", false)
                .classed("node--source", false);

            tooltip
                .style("visibility", "hidden");
        }

        // Lazily construct the package hierarchy from class names.
        function packageHierarchy(classes) {
            var map = {};

            function find(name, data) {
                var node = map[name], i;
                if (!node) {
                    node = map[name] = data || { name: name, children: [] };
                    if (name.length) {
                        node.parent = find(name.substring(0, i = name.lastIndexOf(".")));
                        if (node.parent.children === undefined)
                            node.parent.children = [];
                        node.parent.children.push(node);
                        node.key = name.substring(i + 1);
                        node.name = name;
                    }
                }
                return node;
            }

            classes.forEach(function (d) {
                find(d.name, d);
            });

            return d3.hierarchy(map[""]);
        }

        // Return a list of imports for the given array of nodes.
        function packageImports(root) {
            var map = {},
                imports = [];

            // Compute a map from name to node.
            root.each(function (d) {
                map[d.data.name] = d;
            });

            // For each import, construct a link from the source to target node.
            root.each(function (d) {
                if (d.data.imports) d.data.imports.forEach(function (i) {
                    if (map[i])
                        imports.push(map[d.data.name].path(map[i]));
                });
            });

            return imports;
        }

        // -- Topological sort ---------------------------------------------------
        //
        // Nodes are laid out in rows by dependency rank, one row per "wave" of
        // readiness. Import cycles (mutually-dependent modules) have no valid
        // rank, so every strongly-connected component of size > 1 is condensed
        // into a single collapsible group before ranking, which guarantees
        // ranking always runs over a genuine DAG. The view starts collapsed to
        // just the top-level modules (nothing imports them); clicking a node
        // reveals what it imports, and clicking a cycle group reveals its
        // members and the real cyclic edges between them.

        function buildRawEdges(classes) {
            var edges = [];
            classes.forEach(function (c) {
                (c.imports || []).forEach(function (imp) {
                    if (imp !== c.name) edges.push({ consumer: c.name, dependency: imp });
                });
            });
            return edges;
        }

        function buildRawNodes(classes) {
            var nodeSet = new Set();
            classes.forEach(function (c) {
                nodeSet.add(c.name);
                (c.imports || []).forEach(function (imp) { nodeSet.add(imp); });
            });
            return Array.from(nodeSet);
        }

        var rawNodes = buildRawNodes(classes);
        var rawEdges = buildRawEdges(classes);

        var rawEdgesByConsumer = {};
        rawNodes.forEach(function (n) { rawEdgesByConsumer[n] = []; });
        rawEdges.forEach(function (e) { rawEdgesByConsumer[e.consumer].push(e.dependency); });

        // In/out-degree over the raw import edges: out-degree counts modules
        // that depend on a node, in-degree counts the node's own imports. Used
        // to prefix the leaf glyph and to drop fully-isolated nodes below.
        var topoIndeg = {}, topoOutdeg = {};
        rawNodes.forEach(function (n) { topoIndeg[n] = 0; topoOutdeg[n] = 0; });
        rawEdges.forEach(function (e) { topoIndeg[e.consumer]++; topoOutdeg[e.dependency]++; });

        // Modules with neither incoming nor outgoing arrows take part in no
        // dependency relationship at all - drop them to declutter the view.
        var topoVisibleRawNodes = rawNodes.filter(function (n) { return topoIndeg[n] > 0 || topoOutdeg[n] > 0; });

        // -- Strongly-connected components ---------------------------------
        //
        // Iterative Tarjan (mirrors the Python implementation used for the
        // NCCD metric in metrics.py) to avoid recursion-depth issues on large
        // graphs.
        function computeSCCs(nodes, adj) {
            var indexCounter = 0, index = {}, lowlink = {}, onStack = {}, stack = [], result = [];

            nodes.forEach(function (start) {
                if (start in index) return;

                var work = [[start, (adj[start] || []).slice(), 0]];
                index[start] = lowlink[start] = indexCounter++;
                stack.push(start);
                onStack[start] = true;

                while (work.length) {
                    var frame = work[work.length - 1],
                        v = frame[0], children = frame[1], i = frame[2];

                    if (i < children.length) {
                        var w = children[i];
                        frame[2] = i + 1;
                        if (!(w in index)) {
                            index[w] = lowlink[w] = indexCounter++;
                            stack.push(w);
                            onStack[w] = true;
                            work.push([w, (adj[w] || []).slice(), 0]);
                        } else if (onStack[w]) {
                            lowlink[v] = Math.min(lowlink[v], index[w]);
                        }
                        continue;
                    }

                    work.pop();
                    if (work.length) {
                        var parent = work[work.length - 1][0];
                        lowlink[parent] = Math.min(lowlink[parent], lowlink[v]);
                    }

                    if (lowlink[v] === index[v]) {
                        var component = [], w2;
                        do {
                            w2 = stack.pop();
                            onStack[w2] = false;
                            component.push(w2);
                        } while (w2 !== v);
                        result.push(component);
                    }
                }
            });

            return result;
        }

        // groupOf maps every raw node name to itself (not part of any cycle)
        // or to a synthetic group id shared by every member of its cycle.
        // groupInfo holds the member list for each such group id.
        var groupOf = {}, groupInfo = {}, groupCount = 0;
        computeSCCs(rawNodes, rawEdgesByConsumer).forEach(function (members) {
            if (members.length > 1) {
                var id = "scc:" + (groupCount++);
                groupInfo[id] = { members: members.slice() };
                members.forEach(function (m) { groupOf[m] = id; });
            } else {
                groupOf[members[0]] = members[0];
            }
        });

        // -- Condensation into a DAG, used only to compute a rank for every
        // group/plain node up front. -----------------------------------------

        var condensedNodeSet = new Set();
        topoVisibleRawNodes.forEach(function (n) { condensedNodeSet.add(groupOf[n]); });
        var condensedNodes = Array.from(condensedNodeSet);

        var condensedSeen = new Set(), condensedEdges = [];
        rawEdges.forEach(function (e) {
            var c = groupOf[e.consumer], d = groupOf[e.dependency];
            if (c === d) return;
            var key = c + ">" + d;
            if (condensedSeen.has(key)) return;
            condensedSeen.add(key);
            condensedEdges.push({ consumer: c, dependency: d });
        });

        function computeTopology(nodes, edges) {
            var adj = {}, indeg = {};
            nodes.forEach(function (n) { adj[n] = []; indeg[n] = 0; });
            edges.forEach(function (e) {
                adj[e.dependency].push(e.consumer);
                indeg[e.consumer]++;
            });

            var rank = {}, remaining = new Set(nodes), layer = 0;
            while (remaining.size) {
                var ready = Array.from(remaining).filter(function (n) { return indeg[n] === 0; });

                if (!ready.length) {
                    // Condensation guarantees a DAG, so this should never
                    // trigger; kept as a defensive fallback only.
                    ready = [Array.from(remaining).reduce(function (a, b) {
                        return indeg[a] <= indeg[b] ? a : b;
                    })];
                }

                ready.forEach(function (n) { rank[n] = layer; remaining.delete(n); });
                ready.forEach(function (n) {
                    adj[n].forEach(function (m) {
                        if (remaining.has(m) && --indeg[m] < 0) indeg[m] = 0;
                    });
                });

                layer++;
            }

            var backEdges = edges.filter(function (e) { return rank[e.dependency] >= rank[e.consumer]; });
            return { nodes: nodes, edges: edges, rank: rank, backEdges: backEdges };
        }

        // As-soon-as-possible ranking leaves nodes with a single, far-away
        // consumer stranded several rows below it. Re-rank as-late-as-possible
        // instead: a node sits immediately below its *nearest* consumer, using
        // the longest path to a sink. This also naturally aligns every sink
        // (nothing depends on it) at the very top row.
        function computeAlapRank(topo) {
            var backSet = new Set(topo.backEdges);
            var effectiveEdges = topo.edges.filter(function (e) { return !backSet.has(e); });

            var outCount = {}, deps = {};
            topo.nodes.forEach(function (n) { outCount[n] = 0; deps[n] = []; });
            effectiveEdges.forEach(function (e) {
                outCount[e.dependency]++;
                deps[e.consumer].push(e.dependency);
            });

            var height = {}, remaining = new Set(topo.nodes), wave = 0;
            while (remaining.size) {
                // effectiveEdges excludes all back-edges, so this is a genuine
                // DAG and `ready` is never empty here.
                var ready = Array.from(remaining).filter(function (n) { return outCount[n] === 0; });
                ready.forEach(function (n) { height[n] = wave; remaining.delete(n); });
                ready.forEach(function (n) {
                    deps[n].forEach(function (d) {
                        if (remaining.has(d) && --outCount[d] < 0) outCount[d] = 0;
                    });
                });
                wave++;
            }

            var maxHeight = topo.nodes.reduce(function (max, n) { return Math.max(max, height[n]); }, 0);
            var rank = {};
            topo.nodes.forEach(function (n) { rank[n] = maxHeight - height[n]; });
            return rank;
        }

        var condensedTopo = computeTopology(condensedNodes, condensedEdges);
        var condensedRank = computeAlapRank(condensedTopo);

        // Every displayable id -- a plain node, a collapsed group, or a
        // group's individual member once exploded -- shares its group's
        // rank, so revealing or hiding group members never changes anyone's
        // row.
        var nodeRank = {};
        condensedNodes.forEach(function (n) { nodeRank[n] = condensedRank[n]; });
        Object.keys(groupInfo).forEach(function (gid) {
            groupInfo[gid].members.forEach(function (m) { nodeRank[m] = condensedRank[gid]; });
        });

        var condensedOutdeg = {};
        condensedNodes.forEach(function (n) { condensedOutdeg[n] = 0; });
        condensedEdges.forEach(function (e) { condensedOutdeg[e.dependency]++; });

        // The default view: just the modules nothing else depends on.
        var topoRoots = condensedNodes.filter(function (n) { return condensedOutdeg[n] === 0; });

        // -- Expand/collapse state -------------------------------------------

        var expanded = new Set();

        // `id` is either a raw node name or a group id ("scc:N"). For a
        // group, expanding reveals its members. For anything else, expanding
        // reveals the ids of whatever it imports, mapped through any
        // grouping (an import that belongs to an unexploded group is
        // represented by that group's id; an import that stays inside the
        // *same* group as `id` is dropped, since it's already implied once
        // that group is exploded).
        function childrenOf(id) {
            if (groupInfo[id]) return groupInfo[id].members.slice();

            var own = groupOf[id], children = new Set();
            (rawEdgesByConsumer[id] || []).forEach(function (dep) {
                var t = groupOf[dep];
                if (t !== own) children.add(t);
            });
            return Array.from(children);
        }

        function isExpandable(id) {
            return !!groupInfo[id] || childrenOf(id).length > 0;
        }

        // `rawName` maps to itself unless it belongs to a group: then it maps
        // to the group id, unless that group is currently exploded, in which
        // case it maps to itself so it displays as its own node.
        function displayIdOf(rawName) {
            var g = groupOf[rawName];
            return (g === rawName || expanded.has(g)) ? rawName : g;
        }

        function computeReachable() {
            var reachable = new Set(topoRoots), queue = topoRoots.slice();
            while (queue.length) {
                var id = queue.shift();
                if (!expanded.has(id)) continue;
                childrenOf(id).forEach(function (child) {
                    if (!reachable.has(child)) { reachable.add(child); queue.push(child); }
                });
            }
            return reachable;
        }

        function computeDisplaySet(reachable) {
            var display = new Set(reachable);
            expanded.forEach(function (id) { if (groupInfo[id]) display.delete(id); });
            return display;
        }

        function computeDisplayEdges(displaySet) {
            var seen = new Set(), result = [];
            rawEdges.forEach(function (e) {
                var c = displayIdOf(e.consumer), d = displayIdOf(e.dependency);
                if (c === d || !displaySet.has(c) || !displaySet.has(d)) return;
                var key = c + ">" + d;
                if (seen.has(key)) return;
                seen.add(key);
                result.push({ consumer: c, dependency: d, isBack: nodeRank[d] >= nodeRank[c] });
            });
            return result;
        }

        function toggleExpand(id) {
            if (!isExpandable(id)) return;
            if (expanded.has(id)) expanded.delete(id); else expanded.add(id);

            var reachable = computeReachable();
            Array.from(expanded).forEach(function (e) { if (!reachable.has(e)) expanded.delete(e); });

            renderTopo(computeDisplaySet(reachable));
        }

        // Every group id and every raw node name that has something to
        // reveal, regardless of whether it's currently reachable -- once all
        // of them are marked expanded, the reachability walk from the roots
        // unfolds the entire graph in one pass.
        function allExpandableIds() {
            var ids = new Set(condensedNodes);
            rawNodes.forEach(function (n) { ids.add(n); });
            return Array.from(ids).filter(isExpandable);
        }

        function expandAll() {
            expanded = new Set(allExpandableIds());
            renderTopo(computeDisplaySet(computeReachable()));
        }

        function collapseAll() {
            expanded = new Set();
            renderTopo(computeDisplaySet(computeReachable()));
        }

        d3.select("#topo-expand-all").on("click", expandAll);
        d3.select("#topo-collapse-all").on("click", collapseAll);

        // -- Rendering ---------------------------------------------------------

        // Ubuntu Mono is monospace, so a node's box width can be derived
        // straight from its label length instead of a DOM measurement pass.
        var topoCharWidth = 9.6,
            topoSubCharWidth = 7.8,
            topoBoxPadX = 14,
            topoMinBoxWidth = 56,
            topoBoxHeight = 46,
            topoNodeGap = 18,
            topoRankGap = 76,
            topoMargin = 40;

        var topoLeafGlyph = "🍃 "; // leaf emoji + space, prefixed onto leaf-node titles

        // Split "a.b.c" into a bold title ("c") and a dimmed subtitle showing
        // the rest of the module path ("a.b"). Top-level modules have no dot,
        // so their subtitle is empty.
        function topoNameParts(name) {
            var idx = name.lastIndexOf(".");
            return idx === -1
                ? { prefix: "", title: name }
                : { prefix: name.slice(0, idx), title: name.slice(idx + 1) };
        }

        function displayTitle(id) {
            var base = groupInfo[id]
                ? groupInfo[id].members.length + " modules"
                : (topoIndeg[id] === 0 ? topoLeafGlyph : "") + topoNameParts(id).title;
            if (!isExpandable(id)) return base;
            return base + (expanded.has(id) ? " −" : " +");
        }

        function displaySubtitle(id) {
            return groupInfo[id] ? "cycle" : topoNameParts(id).prefix;
        }

        function displayBoxWidth(id) {
            var titleWidth = displayTitle(id).length * topoCharWidth;
            var subWidth = displaySubtitle(id).length * topoSubCharWidth;
            return Math.max(topoMinBoxWidth, Math.round(Math.max(titleWidth, subWidth)) + topoBoxPadX * 2);
        }

        function renderTopo(displaySet) {
            d3.select("#view-topo").select("svg#topo").remove();

            var displayNodes = Array.from(displaySet).sort();

            // Compact whatever ranks appear in the current display to a
            // contiguous 0..k range.
            var rankValues = Array.from(new Set(displayNodes.map(function (n) { return nodeRank[n]; })))
                .sort(function (a, b) { return a - b; });
            var rankIndex = {};
            rankValues.forEach(function (v, i) { rankIndex[v] = i; });

            var layers = {};
            displayNodes.forEach(function (n) {
                var r = rankIndex[nodeRank[n]];
                (layers[r] = layers[r] || []).push(n);
            });

            var ranks = Object.keys(layers).map(Number).sort(function (a, b) { return a - b; });

            // Rank 0 (the leaves) is drawn in the bottom-most row, with
            // dependents stacking upward above them.
            var maxRank = ranks.length - 1;
            var rankY = {};
            ranks.forEach(function (r) { rankY[r] = topoMargin + (maxRank - r) * (topoBoxHeight + topoRankGap); });

            var rankWidth = {};
            ranks.forEach(function (r) {
                var widths = layers[r].map(displayBoxWidth);
                rankWidth[r] = widths.reduce(function (a, b) { return a + b; }, 0) + (widths.length - 1) * topoNodeGap;
            });

            var contentHeight = ranks.length * topoBoxHeight + (ranks.length - 1) * topoRankGap,
                contentWidth = ranks.reduce(function (max, r) { return Math.max(max, rankWidth[r]); }, topoMinBoxWidth);

            var pos = {};
            ranks.forEach(function (r) {
                var startX = topoMargin + (contentWidth - rankWidth[r]) / 2, cx = startX;
                layers[r].forEach(function (name) {
                    var w = displayBoxWidth(name);
                    pos[name] = { x: cx, y: rankY[r], width: w, height: topoBoxHeight };
                    cx += w + topoNodeGap;
                });
            });

            var displayEdges = computeDisplayEdges(displaySet);
            var loopGap = displayEdges.some(function (e) { return e.isBack; }) ? 90 : 0;

            var width = contentWidth + topoMargin * 2 + loopGap,
                height = contentHeight + topoMargin * 2;

            var svgTopo = d3.select("#view-topo").append("svg")
                .attr("id", "topo")
                .attr("width", width)
                .attr("height", height);

            var defs = svgTopo.append("defs");

            function marker(id, fill) {
                defs.append("marker")
                    .attr("id", id)
                    .attr("viewBox", "0 0 10 10")
                    .attr("refX", 9).attr("refY", 5)
                    .attr("markerWidth", 7).attr("markerHeight", 7)
                    .attr("orient", "auto-start-reverse")
                    .append("path")
                    .attr("d", "M0,0L10,5L0,10z")
                    .style("fill", fill);
            }

            marker("topo-arrow", "#8899a0");
            marker("topo-arrow-source", "#d6bc27");
            marker("topo-arrow-target", "#5890e2");
            marker("topo-arrow-cycle", "#e23d3d");

            // Forward edges connect box edges directly, bottom to top, since
            // lower ranks sit at the bottom. Back/cycle edges (only possible
            // between members of the same exploded group, since ranking
            // otherwise runs over a true DAG) loop through a lane just to the
            // right of whichever rows they span, so short-range cycles get a
            // short local loop instead of a long detour to the far edge.
            var rankRight = {};
            ranks.forEach(function (r) {
                rankRight[r] = layers[r].reduce(function (max, n) { return Math.max(max, pos[n].x + pos[n].width); }, 0);
            });

            var backIndex = 0;

            function linkPath(d) {
                var src = pos[d.dependency], dst = pos[d.consumer];

                if (!d.isBack) {
                    var x0 = src.x + src.width / 2, y0 = src.y - src.height / 2,
                        x1 = dst.x + dst.width / 2, y1 = dst.y + dst.height / 2,
                        mid = (y0 + y1) / 2;
                    return "M" + x0 + "," + y0 + "C" + x0 + "," + mid + " " + x1 + "," + mid + " " + x1 + "," + y1;
                }

                var r1 = rankIndex[nodeRank[d.dependency]], r2 = rankIndex[nodeRank[d.consumer]];
                var lo = Math.min(r1, r2), hi = Math.max(r1, r2), localRight = 0;
                for (var r = lo; r <= hi; r++) localRight = Math.max(localRight, rankRight[r]);

                var loopX = localRight + 24 + (backIndex++ % 5) * 12;
                var sx = src.x + src.width / 2, sy = src.y + src.height / 2,
                    tx = dst.x + dst.width / 2, ty = dst.y + dst.height / 2;
                return "M" + sx + "," + sy + "C" + loopX + "," + sy + " " + loopX + "," + ty + " " + tx + "," + ty;
            }

            var topoLink = svgTopo.append("g").selectAll(".topo-link")
                .data(displayEdges)
                .enter().append("path")
                .attr("class", function (d) { return "topo-link" + (d.isBack ? " topo-link--cycle" : ""); })
                .attr("marker-end", function (d) { return d.isBack ? "url(#topo-arrow-cycle)" : "url(#topo-arrow)"; })
                .attr("d", linkPath);

            var nodeData = displayNodes.map(function (n) {
                var isCycle = !!groupInfo[n] || groupOf[n] !== n;
                return {
                    name: n,
                    title: displayTitle(n),
                    subtitle: displaySubtitle(n),
                    isLeaf: !groupInfo[n] && topoIndeg[n] === 0,
                    isGroup: !!groupInfo[n],
                    isCycle: isCycle,
                    isExpandable: isExpandable(n),
                    x: pos[n].x, y: pos[n].y, width: pos[n].width, height: pos[n].height,
                };
            });

            var topoNode = svgTopo.append("g").selectAll(".topo-node")
                .data(nodeData)
                .enter().append("g")
                .attr("class", function (d) {
                    return "topo-node"
                        + (d.isLeaf ? " topo-node--leaf" : "")
                        + (d.isCycle ? " topo-node--cycle" : "")
                        + (d.isGroup ? " topo-node--group" : "")
                        + (d.isExpandable ? " topo-node--expandable" : "");
                })
                .on("mouseover", mouseoveredTopo)
                .on("mouseout", mouseoutedTopo)
                .on("click", function (d) { toggleExpand(d.name); });

            topoNode.append("rect")
                .attr("x", function (d) { return d.x; })
                .attr("y", function (d) { return d.y - d.height / 2; })
                .attr("width", function (d) { return d.width; })
                .attr("height", function (d) { return d.height; })
                .attr("rx", 4).attr("ry", 4);

            topoNode.append("text")
                .attr("class", "topo-node-title")
                .attr("x", function (d) { return d.x + d.width / 2; })
                .attr("y", function (d) { return d.y - (d.subtitle ? 9 : 0); })
                .text(function (d) { return d.title; });

            topoNode.filter(function (d) { return d.subtitle; }).append("text")
                .attr("class", "topo-node-subtitle")
                .attr("x", function (d) { return d.x + d.width / 2; })
                .attr("y", function (d) { return d.y + 11; })
                .text(function (d) { return d.subtitle; });

            function mouseoveredTopo(d) {
                topoLink
                    .classed("topo-link--target", function (l) { return l.dependency === d.name; })
                    .classed("topo-link--source", function (l) { return l.consumer === d.name; })
                    .attr("marker-end", function (l) {
                        if (l.isBack) return "url(#topo-arrow-cycle)";
                        if (l.dependency === d.name) return "url(#topo-arrow-target)";
                        if (l.consumer === d.name) return "url(#topo-arrow-source)";
                        return "url(#topo-arrow)";
                    })
                    .filter(function (l) { return l.consumer === d.name || l.dependency === d.name; })
                    .raise();

                topoNode
                    .classed("topo-node--target", function (n) { return n.name !== d.name && displayEdges.some(function (l) { return l.dependency === n.name && l.consumer === d.name; }); })
                    .classed("topo-node--source", function (n) { return n.name !== d.name && displayEdges.some(function (l) { return l.consumer === n.name && l.dependency === d.name; }); });

                tooltip
                    .text(d.name)
                    .style("visibility", "visible");
            }

            function mouseoutedTopo(d) {
                topoLink
                    .classed("topo-link--target", false)
                    .classed("topo-link--source", false)
                    .attr("marker-end", function (l) { return l.isBack ? "url(#topo-arrow-cycle)" : "url(#topo-arrow)"; });

                topoNode
                    .classed("topo-node--target", false)
                    .classed("topo-node--source", false);

                tooltip
                    .style("visibility", "hidden");
            }
        }

        if (groupCount > 0) {
            legend.attr("height", 108);
            legend.append("circle")
                .attr("cx", 10).attr("cy", 52).attr("r", 6)
                .style("fill", "#e23d3d")
            legend.append("text")
                .attr("x", 30).attr("y", 52)
                .attr("alignment-baseline", "middle").attr("fill", "#bbb")
                .text("cycle").style("font-size", "11px")

            legend.append("rect")
                .attr("x", 4).attr("y", 66).attr("width", 12).attr("height", 12).attr("rx", 2)
                .style("fill", "#3a1f1f").style("stroke", "#e23d3d")
            legend.append("text")
                .attr("x", 30).attr("y", 72)
                .attr("alignment-baseline", "middle").attr("fill", "#bbb")
                .text("in a cycle").style("font-size", "11px")

            legend.append("rect")
                .attr("x", 4).attr("y", 86).attr("width", 12).attr("height", 12).attr("rx", 2)
                .style("fill", "#24393a").style("stroke", "#6d8f90").style("stroke-dasharray", "3,2")
            legend.append("text")
                .attr("x", 30).attr("y", 92)
                .attr("alignment-baseline", "middle").attr("fill", "#bbb")
                .text("cycle group — click to expand").style("font-size", "11px")
        }

        renderTopo(computeDisplaySet(computeReachable()));

    </script>
</body>
