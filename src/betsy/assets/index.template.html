<!DOCTYPE html>
<meta charset="utf-8">
<style>
    body {
        background-color: darkslategray;
    }

    .node {
        font: 300 13px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
        fill: #bbb;
    }

    #tooltip {
        color: #bbb;
        font: 300 16px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .node:hover {
        fill: rgb(212, 80, 224);
    }

    .link {
        stroke: gray;
        stroke-opacity: 0.4;
        fill: none;
        pointer-events: none;
    }

    .node:hover,
    .node--source,
    .node--target {
        font-weight: 700;
        font-size: 16px;
    }

    .node--source {
        fill: #5890e2;
    }

    .node--target {
        fill: #d6bc27;
    }

    .link--source,
    .link--target {
        stroke-opacity: 1;
        stroke-width: 2px;
    }

    .link--source {
        stroke: #d6bc27;
    }

    .link--target {
        stroke: #5890e2;
    }

    .link--cycle {
        stroke: #e23d3d;
        stroke-opacity: 0.9;
        stroke-width: 2px;
        stroke-dasharray: 5, 3;
    }

    .topo-link {
        stroke: #8899a0;
        stroke-opacity: 0.55;
        fill: none;
    }

    .topo-link--source {
        stroke: #d6bc27;
        stroke-opacity: 1;
        stroke-width: 2px;
    }

    .topo-link--target {
        stroke: #5890e2;
        stroke-opacity: 1;
        stroke-width: 2px;
    }

    .topo-link--cycle {
        stroke: #e23d3d;
        stroke-opacity: 0.85;
        stroke-width: 2px;
        stroke-dasharray: 5, 3;
    }

    .topo-node rect {
        fill: #24393a;
        stroke: #6d8f90;
        stroke-width: 1px;
    }

    .topo-node text {
        fill: #bbb;
        font: 300 16px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
    }

    .topo-node .topo-node-title {
        font-weight: 700;
    }

    .topo-node .topo-node-subtitle {
        font-size: 13px;
        fill-opacity: 0.65;
    }

    .topo-node:hover rect {
        stroke: rgb(212, 80, 224);
        stroke-width: 2px;
    }

    .topo-node:hover text {
        fill: rgb(212, 80, 224);
    }

    .topo-node--source rect {
        stroke: #d6bc27;
        stroke-width: 2px;
    }

    .topo-node--source text {
        fill: #d6bc27;
        font-weight: 700;
    }

    .topo-node--target rect {
        stroke: #5890e2;
        stroke-width: 2px;
    }

    .topo-node--target text {
        fill: #5890e2;
        font-weight: 700;
    }

    .topo-node--leaf rect {
        fill: #1f3a24;
        stroke: #6fbf73;
    }

    .topo-node--leaf text {
        fill: #a3d9a5;
    }

    .topo-node--cycle rect {
        fill: #3a1f1f;
        stroke: #e23d3d;
        stroke-width: 2px;
    }

    .topo-node--cycle text {
        fill: #f2a3a3;
        font-weight: 700;
    }

    #bundle,
    #topo {
        margin-left: auto;
        margin-right: auto;
        display: block;
    }

    #legend {
        position: fixed;
        right: 0px;
        top: 0px;
    }

    #tabs {
        position: fixed;
        left: 0px;
        top: 0px;
        z-index: 20;
        padding: 8px;
    }

    #tabs button {
        background: #2f4f4f;
        color: #ddd;
        border: 1px solid #567;
        border-radius: 3px;
        padding: 6px 12px;
        margin-right: 4px;
        font: 300 13px "Ubuntu Mono", "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: pointer;
    }

    #tabs button.active {
        background: #5890e2;
        color: #111;
        font-weight: 700;
    }
</style>

<body>
    <div id="tabs">
        <button id="tab-bundle" class="active">Hierarchical Bundle</button>
        <button id="tab-topo">Topological Sort</button>
    </div>

    <div id="view-bundle"></div>
    <div id="view-topo" style="display: none;"></div>

    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script>

        var classes = []

        var tooltip = d3.select("body")
            .append("div")
            .attr("id", "tooltip")
            .style("position", "fixed")
            .style("z-index", "10")
            .style("visibility", "hidden")
            .text("a simple tooltip");

        var legend = d3.select("body").append("svg")
            .attr("id", "legend")
            .attr("width", 128)
            .attr("height", 48);

        legend.append("circle")
            .attr("cx", 10).attr("cy", 12).attr("r", 6)
            .style("fill", "#d6bc27")
        legend.append("text")
            .attr("x", 30).attr("y", 12)
            .attr("alignment-baseline", "middle").attr("fill", "#bbb")
            .text("imports").style("font-size", "11px")

        legend.append("circle")
            .attr("cx", 10).attr("cy", 32).attr("r", 6)
            .style("fill", "#5890e2")
        legend.append("text")
            .attr("x", 30).attr("y", 32)
            .attr("alignment-baseline", "middle").attr("fill", "#bbb")
            .text("imported by").style("font-size", "11px")

        // -- Tabs --------------------------------------------------------------

        d3.select("#tab-bundle").on("click", function () { showView("bundle"); });
        d3.select("#tab-topo").on("click", function () { showView("topo"); });

        function showView(view) {
            d3.select("#view-bundle").style("display", view === "bundle" ? "block" : "none");
            d3.select("#view-topo").style("display", view === "topo" ? "block" : "none");
            d3.select("#tab-bundle").classed("active", view === "bundle");
            d3.select("#tab-topo").classed("active", view === "topo");
        }

        // -- Hierarchical edge bundling -----------------------------------------

        var diameter = 800,
            radius = diameter / 3,
            innerRadius = radius - 120;

        var cluster = d3.cluster()
            .size([360, innerRadius]);

        var line = d3.radialLine()
            .curve(d3.curveBundle.beta(0.85))
            .radius(function (d) { return d.y; })
            .angle(function (d) { return d.x / 180 * Math.PI; });

        var svg = d3.select("#view-bundle").append("svg")
            .attr("id", "bundle")
            .attr("width", diameter)
            .attr("height", diameter)
            .append("g")
            .attr("transform", "translate(" + diameter / 2 + "," + diameter / 2 + ")");

        var link = svg.append("g").selectAll(".link"),
            node = svg.append("g").selectAll(".node");

        var root = packageHierarchy(classes)
            .sum(function (d) { return 1; });


        var nodes = []
        root.each(d => nodes.push(d));

        cluster(root);

        link = link
            .data(packageImports(root))
            .enter().append("path")
            .each(function (d) { d.source = d[0], d.target = d[d.length - 1]; })
            .attr("class", "link")
            .attr("d", line);

        node = node
            .data(nodes)
            .enter().append("text")
            .attr("class", "node")
            .attr("dy", "0.31em")
            .attr("transform", function (d) { return "rotate(" + (d.x - 90) + ")translate(" + (d.y + 8) + ",0)" + (d.x < 180 ? "" : "rotate(180)"); })
            .attr("text-anchor", function (d) { return d.x < 180 ? "start" : "end"; })
            .text(function (d) { return d.data.key; })
            .on("mouseover", mouseovered)
            .on("mouseout", mouseouted);

        function mouseovered(d) {
            node
                .each(function (n) { n.target = n.source = false; });

            link
                .classed("link--target", function (l) { if (l.target === d) return l.source.source = true; })
                .classed("link--source", function (l) { if (l.source === d) return l.target.target = true; })
                .filter(function (l) { return l.target === d || l.source === d; })
                .raise();

            node
                .classed("node--target", function (n) { return n.target; })
                .classed("node--source", function (n) { return n.source; });

            tooltip
                .text(d.data.name)
                .style("visibility", "visible");
        }

        function mouseouted(d) {
            link
                .classed("link--target", false)
                .classed("link--source", false);

            node
                .classed("node--target", false)
                .classed("node--source", false);

            tooltip
                .style("visibility", "hidden");
        }

        // Lazily construct the package hierarchy from class names.
        function packageHierarchy(classes) {
            var map = {};

            function find(name, data) {
                var node = map[name], i;
                if (!node) {
                    node = map[name] = data || { name: name, children: [] };
                    if (name.length) {
                        node.parent = find(name.substring(0, i = name.lastIndexOf(".")));
                        if (node.parent.children === undefined)
                            node.parent.children = [];
                        node.parent.children.push(node);
                        node.key = name.substring(i + 1);
                        node.name = name;
                    }
                }
                return node;
            }

            classes.forEach(function (d) {
                find(d.name, d);
            });

            return d3.hierarchy(map[""]);
        }

        // Return a list of imports for the given array of nodes.
        function packageImports(root) {
            var map = {},
                imports = [];

            // Compute a map from name to node.
            root.each(function (d) {
                map[d.data.name] = d;
            });

            // For each import, construct a link from the source to target node.
            root.each(function (d) {
                if (d.data.imports) d.data.imports.forEach(function (i) {
                    if (map[i])
                        imports.push(map[d.data.name].path(map[i]));
                });
            });

            return imports;
        }

        // -- Topological sort ---------------------------------------------------
        //
        // Nodes are laid out in rows by dependency rank: a module with no
        // internal dependencies sits in row 0, and every other module sits one
        // row below its deepest dependency. When the import graph contains a
        // cycle (so no true topological order exists), the cycle is broken
        // greedily by peeling off the node with the fewest outstanding
        // dependencies at each step, and the edges that violate the resulting
        // order are drawn as dashed red "cycle" links.

        function computeTopology(classes) {
            var nodeSet = new Set();
            classes.forEach(function (c) {
                nodeSet.add(c.name);
                (c.imports || []).forEach(function (imp) { nodeSet.add(imp); });
            });

            // Edge direction for ranking purposes: dependency -> consumer, i.e.
            // the dependency must be ready (lower rank) before its consumer.
            var edges = [];
            classes.forEach(function (c) {
                (c.imports || []).forEach(function (imp) {
                    if (imp !== c.name) edges.push({ consumer: c.name, dependency: imp });
                });
            });

            var nodes = Array.from(nodeSet);
            var adj = {}, indeg = {};
            nodes.forEach(function (n) { adj[n] = []; indeg[n] = 0; });
            edges.forEach(function (e) {
                adj[e.dependency].push(e.consumer);
                indeg[e.consumer]++;
            });

            var rank = {}, remaining = new Set(nodes), layer = 0;
            while (remaining.size) {
                var ready = Array.from(remaining).filter(function (n) { return indeg[n] === 0; });

                if (!ready.length) {
                    // No node is fully ready: we're inside a cycle. Break it by
                    // peeling off the node with the fewest outstanding
                    // dependencies (a standard greedy feedback-arc-set heuristic).
                    ready = [Array.from(remaining).reduce(function (a, b) {
                        return indeg[a] <= indeg[b] ? a : b;
                    })];
                }

                ready.forEach(function (n) { rank[n] = layer; remaining.delete(n); });
                ready.forEach(function (n) {
                    adj[n].forEach(function (m) {
                        if (remaining.has(m) && --indeg[m] < 0) indeg[m] = 0;
                    });
                });

                layer++;
            }

            var backEdges = edges.filter(function (e) { return rank[e.dependency] >= rank[e.consumer]; });

            return { nodes: nodes, edges: edges, rank: rank, backEdges: backEdges };
        }

        // computeTopology() ranks each node as early as possible (ASAP): as
        // soon as its dependencies allow. That leaves nodes with a single,
        // far-away consumer stranded several rows below it. Re-rank instead
        // as late as possible (ALAP): a node sits immediately below its
        // *nearest* consumer, using the longest path to a sink (rather than
        // shortest) to guarantee every dependency still ends up strictly
        // below every one of its consumers. This also naturally aligns every
        // sink (nothing depends on it) at the very top row, without needing
        // a separate pinning step.
        function computeAlapRank(topo) {
            var backSet = new Set(topo.backEdges);
            var effectiveEdges = topo.edges.filter(function (e) { return !backSet.has(e); });

            var outCount = {}, deps = {};
            topo.nodes.forEach(function (n) { outCount[n] = 0; deps[n] = []; });
            effectiveEdges.forEach(function (e) {
                outCount[e.dependency]++;
                deps[e.consumer].push(e.dependency);
            });

            var height = {}, remaining = new Set(topo.nodes), wave = 0;
            while (remaining.size) {
                // effectiveEdges excludes all cycle-breaking back-edges, so this
                // is a genuine DAG and `ready` is never empty here.
                var ready = Array.from(remaining).filter(function (n) { return outCount[n] === 0; });
                ready.forEach(function (n) { height[n] = wave; remaining.delete(n); });
                ready.forEach(function (n) {
                    deps[n].forEach(function (d) {
                        if (remaining.has(d) && --outCount[d] < 0) outCount[d] = 0;
                    });
                });
                wave++;
            }

            var maxHeight = topo.nodes.reduce(function (max, n) { return Math.max(max, height[n]); }, 0);
            var rank = {};
            topo.nodes.forEach(function (n) { rank[n] = maxHeight - height[n]; });
            return rank;
        }

        var topo = computeTopology(classes);
        var topoAlapRank = computeAlapRank(topo);

        var topoCycleNodes = new Set();
        topo.backEdges.forEach(function (e) {
            topoCycleNodes.add(e.dependency);
            topoCycleNodes.add(e.consumer);
        });

        if (topo.backEdges.length > 0) {
            legend.attr("height", 88);
            legend.append("circle")
                .attr("cx", 10).attr("cy", 52).attr("r", 6)
                .style("fill", "#e23d3d")
            legend.append("text")
                .attr("x", 30).attr("y", 52)
                .attr("alignment-baseline", "middle").attr("fill", "#bbb")
                .text("cycle").style("font-size", "11px")

            legend.append("rect")
                .attr("x", 4).attr("y", 66).attr("width", 12).attr("height", 12).attr("rx", 2)
                .style("fill", "#3a1f1f").style("stroke", "#e23d3d")
            legend.append("text")
                .attr("x", 30).attr("y", 72)
                .attr("alignment-baseline", "middle").attr("fill", "#bbb")
                .text("in a cycle").style("font-size", "11px")
        }

        // In/out-degree over the same dependency -> consumer edges used for
        // ranking: out-degree counts modules that depend on a node, in-degree
        // counts the node's own internal dependencies.
        var topoOutdeg = {}, topoIndeg = {};
        topo.nodes.forEach(function (n) { topoOutdeg[n] = 0; topoIndeg[n] = 0; });
        topo.edges.forEach(function (e) {
            topoOutdeg[e.dependency]++;
            topoIndeg[e.consumer]++;
        });

        // Modules with neither incoming nor outgoing arrows take part in no
        // dependency relationship at all - drop them to declutter the view.
        var topoVisibleNodes = topo.nodes.filter(function (n) { return topoOutdeg[n] > 0 || topoIndeg[n] > 0; });

        // Dropping the isolated nodes above can leave gaps in the ALAP rank
        // sequence; compact what remains to a contiguous 0..k range.
        var topoRankValues = Array.from(new Set(topoVisibleNodes.map(function (n) { return topoAlapRank[n]; })))
            .sort(function (a, b) { return a - b; });
        var topoRankIndex = {};
        topoRankValues.forEach(function (v, i) { topoRankIndex[v] = i; });

        var topoLayers = {};
        topoVisibleNodes.forEach(function (n) {
            var r = topoRankIndex[topoAlapRank[n]];
            (topoLayers[r] = topoLayers[r] || []).push(n);
        });

        var topoRanks = Object.keys(topoLayers).map(Number).sort(function (a, b) { return a - b; });

        // Ubuntu Mono is monospace, so a node's box width can be derived
        // straight from its label length instead of a DOM measurement pass.
        var topoCharWidth = 9.6,
            topoSubCharWidth = 7.8,
            topoBoxPadX = 14,
            topoMinBoxWidth = 56,
            topoBoxHeight = 46,
            topoNodeGap = 18,
            topoRankGap = 76,
            topoMargin = 40;

        var topoLeafGlyph = "🍃 "; // leaf emoji + space, prefixed onto leaf-node titles

        // Split "a.b.c" into a bold title ("c") and a dimmed subtitle showing
        // the rest of the module path ("a.b"). Top-level modules have no dot,
        // so their subtitle is empty.
        function topoNameParts(name) {
            var idx = name.lastIndexOf(".");
            return idx === -1
                ? { prefix: "", title: name }
                : { prefix: name.slice(0, idx), title: name.slice(idx + 1) };
        }

        function topoTitle(name) {
            var parts = topoNameParts(name);
            return (topoIndeg[name] === 0 ? topoLeafGlyph : "") + parts.title;
        }

        function topoBoxWidth(name) {
            var parts = topoNameParts(name);
            var titleWidth = topoTitle(name).length * topoCharWidth;
            var subWidth = parts.prefix.length * topoSubCharWidth;
            return Math.max(topoMinBoxWidth, Math.round(Math.max(titleWidth, subWidth)) + topoBoxPadX * 2);
        }

        // Rank 0 (the leaves, with no internal dependencies) is drawn in the
        // bottom-most row, with dependents stacking upward above them.
        var topoMaxRank = topoRanks.length - 1;
        var topoRankY = {};
        topoRanks.forEach(function (r) {
            topoRankY[r] = topoMargin + (topoMaxRank - r) * (topoBoxHeight + topoRankGap);
        });

        var topoRankWidth = {};
        topoRanks.forEach(function (r) {
            var widths = topoLayers[r].map(topoBoxWidth);
            topoRankWidth[r] = widths.reduce(function (a, b) { return a + b; }, 0) + (widths.length - 1) * topoNodeGap;
        });

        var topoContentHeight = topoRanks.length * topoBoxHeight + (topoRanks.length - 1) * topoRankGap,
            topoContentWidth = topoRanks.reduce(function (max, r) { return Math.max(max, topoRankWidth[r]); }, topoMinBoxWidth);

        var topoLoopGap = topo.backEdges.length > 0 ? 90 : 0;

        var topoWidth = topoContentWidth + topoMargin * 2 + topoLoopGap,
            topoHeight = topoContentHeight + topoMargin * 2;

        var topoPos = {};
        topoRanks.forEach(function (r) {
            var row = topoLayers[r].slice().sort();
            var startX = topoMargin + (topoContentWidth - topoRankWidth[r]) / 2;
            var cx = startX;
            row.forEach(function (name) {
                var w = topoBoxWidth(name);
                topoPos[name] = { x: cx, y: topoRankY[r], width: w, height: topoBoxHeight };
                cx += w + topoNodeGap;
            });
        });

        var svgTopo = d3.select("#view-topo").append("svg")
            .attr("id", "topo")
            .attr("width", topoWidth)
            .attr("height", topoHeight);

        var topoDefs = svgTopo.append("defs");

        function topoMarker(id, fill) {
            topoDefs.append("marker")
                .attr("id", id)
                .attr("viewBox", "0 0 10 10")
                .attr("refX", 9).attr("refY", 5)
                .attr("markerWidth", 7).attr("markerHeight", 7)
                .attr("orient", "auto-start-reverse")
                .append("path")
                .attr("d", "M0,0L10,5L0,10z")
                .style("fill", fill);
        }

        topoMarker("topo-arrow", "#8899a0");
        topoMarker("topo-arrow-source", "#d6bc27");
        topoMarker("topo-arrow-target", "#5890e2");
        topoMarker("topo-arrow-cycle", "#e23d3d");

        // Forward edges (dependency -> consumer) connect box edges directly,
        // bottom to top, since leaves sit at the bottom. Back/cycle edges loop
        // through a lane just to the right of whichever rows they actually
        // span, rather than the whole diagram, so short-range cycles get a
        // short local loop instead of a long detour to the far edge.
        var topoNodeRank = {};
        topoVisibleNodes.forEach(function (n) { topoNodeRank[n] = topoRankIndex[topoAlapRank[n]]; });

        var topoRankRight = {};
        topoRanks.forEach(function (r) {
            topoRankRight[r] = topoLayers[r].reduce(function (max, n) {
                return Math.max(max, topoPos[n].x + topoPos[n].width);
            }, 0);
        });

        var backIndex = 0;

        function topoLinkPath(d) {
            var src = topoPos[d.dependency], dst = topoPos[d.consumer];

            if (!d.isBack) {
                var x0 = src.x + src.width / 2, y0 = src.y - src.height / 2,
                    x1 = dst.x + dst.width / 2, y1 = dst.y + dst.height / 2,
                    mid = (y0 + y1) / 2;
                return "M" + x0 + "," + y0 + "C" + x0 + "," + mid + " " + x1 + "," + mid + " " + x1 + "," + y1;
            }

            var r1 = topoNodeRank[d.dependency], r2 = topoNodeRank[d.consumer];
            var lo = Math.min(r1, r2), hi = Math.max(r1, r2);
            var localRight = 0;
            for (var r = lo; r <= hi; r++) localRight = Math.max(localRight, topoRankRight[r]);

            var loopX = localRight + 24 + (backIndex++ % 5) * 12;
            var sx = src.x + src.width / 2, sy = src.y + src.height / 2,
                tx = dst.x + dst.width / 2, ty = dst.y + dst.height / 2;
            return "M" + sx + "," + sy +
                "C" + loopX + "," + sy + " " + loopX + "," + ty + " " + tx + "," + ty;
        }

        var topoLinkData = topo.edges.map(function (e) {
            return {
                consumer: e.consumer,
                dependency: e.dependency,
                isBack: topo.backEdges.indexOf(e) !== -1,
            };
        });

        var topoLink = svgTopo.append("g").selectAll(".topo-link")
            .data(topoLinkData)
            .enter().append("path")
            .attr("class", function (d) { return "topo-link" + (d.isBack ? " topo-link--cycle" : ""); })
            .attr("marker-end", function (d) { return d.isBack ? "url(#topo-arrow-cycle)" : "url(#topo-arrow)"; })
            .attr("d", topoLinkPath);

        var topoNodeData = topoVisibleNodes.map(function (n) {
            var parts = topoNameParts(n);
            return {
                name: n,
                title: topoTitle(n),
                subtitle: parts.prefix,
                isLeaf: topoIndeg[n] === 0,
                isCycle: topoCycleNodes.has(n),
                x: topoPos[n].x, y: topoPos[n].y, width: topoPos[n].width, height: topoPos[n].height,
            };
        });

        var topoNode = svgTopo.append("g").selectAll(".topo-node")
            .data(topoNodeData)
            .enter().append("g")
            .attr("class", function (d) {
                return "topo-node" + (d.isLeaf ? " topo-node--leaf" : "") + (d.isCycle ? " topo-node--cycle" : "");
            })
            .on("mouseover", mouseoveredTopo)
            .on("mouseout", mouseoutedTopo);

        topoNode.append("rect")
            .attr("x", function (d) { return d.x; })
            .attr("y", function (d) { return d.y - d.height / 2; })
            .attr("width", function (d) { return d.width; })
            .attr("height", function (d) { return d.height; })
            .attr("rx", 4).attr("ry", 4);

        topoNode.append("text")
            .attr("class", "topo-node-title")
            .attr("x", function (d) { return d.x + d.width / 2; })
            .attr("y", function (d) { return d.y - (d.subtitle ? 9 : 0); })
            .text(function (d) { return d.title; });

        topoNode.filter(function (d) { return d.subtitle; }).append("text")
            .attr("class", "topo-node-subtitle")
            .attr("x", function (d) { return d.x + d.width / 2; })
            .attr("y", function (d) { return d.y + 11; })
            .text(function (d) { return d.subtitle; });

        function mouseoveredTopo(d) {
            topoLink
                .classed("topo-link--target", function (l) { return l.dependency === d.name; })
                .classed("topo-link--source", function (l) { return l.consumer === d.name; })
                .attr("marker-end", function (l) {
                    if (l.isBack) return "url(#topo-arrow-cycle)";
                    if (l.dependency === d.name) return "url(#topo-arrow-target)";
                    if (l.consumer === d.name) return "url(#topo-arrow-source)";
                    return "url(#topo-arrow)";
                })
                .filter(function (l) { return l.consumer === d.name || l.dependency === d.name; })
                .raise();

            topoNode
                .classed("topo-node--target", function (n) { return n.name !== d.name && topoLinkData.some(function (l) { return l.dependency === n.name && l.consumer === d.name; }); })
                .classed("topo-node--source", function (n) { return n.name !== d.name && topoLinkData.some(function (l) { return l.consumer === n.name && l.dependency === d.name; }); });

            tooltip
                .text(d.name)
                .style("visibility", "visible");
        }

        function mouseoutedTopo(d) {
            topoLink
                .classed("topo-link--target", false)
                .classed("topo-link--source", false)
                .attr("marker-end", function (l) { return l.isBack ? "url(#topo-arrow-cycle)" : "url(#topo-arrow)"; });

            topoNode
                .classed("topo-node--target", false)
                .classed("topo-node--source", false);

            tooltip
                .style("visibility", "hidden");
        }

    </script>
</body>
